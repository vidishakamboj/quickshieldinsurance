<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Claims - Smart Insurance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>My Claim History</h2>
        <table id="claimsTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Plan</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Reason</th>
                    <th>Payout</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody>
                <!-- Claims will be dynamically added here -->
            </tbody>
        </table>
        <button onclick="goDashboard()">Back to Dashboard</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
